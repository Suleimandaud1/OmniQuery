<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OmniQuery – AI-Powered SQL & Pandas Engineer</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React & ReactDOM via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel (transpiles JSX in-browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide Icons via CDN -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <style>
    body { background: #020817; }

    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #0b1329; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #334155; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .animate-bounce { animation: bounce 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .5; }
    }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

    @keyframes ping {
      75%, 100% { transform: scale(2); opacity: 0; }
    }
    .animate-ping { animation: ping 1s cubic-bezier(0, 0, 0.2, 1) infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── Lucide icon wrappers ──────────────────────────────────────────────────
    const Icon = ({ name, className = "w-5 h-5" }) => {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current && window.lucide) {
          ref.current.innerHTML = "";
          const el = document.createElement("i");
          el.setAttribute("data-lucide", name);
          el.className = className;
          ref.current.appendChild(el);
          lucide.createIcons({ nodes: [el] });
        }
      }, [name, className]);
      return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} />;
    };

    // Shorthand icon components
    const Database      = (p) => <Icon name="database"        {...p} />;
    const Code          = (p) => <Icon name="code"            {...p} />;
    const Terminal      = (p) => <Icon name="terminal"        {...p} />;
    const Play          = (p) => <Icon name="play"            {...p} />;
    const Copy          = (p) => <Icon name="copy"            {...p} />;
    const Check         = (p) => <Icon name="check"           {...p} />;
    const Upload        = (p) => <Icon name="upload"          {...p} />;
    const Plus          = (p) => <Icon name="plus"            {...p} />;
    const Trash2        = (p) => <Icon name="trash-2"         {...p} />;
    const FileSpreadsheet = (p) => <Icon name="file-spreadsheet" {...p} />;
    const Settings      = (p) => <Icon name="settings"        {...p} />;
    const Sparkles      = (p) => <Icon name="sparkles"        {...p} />;
    const HelpCircle    = (p) => <Icon name="help-circle"     {...p} />;
    const RotateCcw     = (p) => <Icon name="rotate-ccw"      {...p} />;
    const ChevronDown   = (p) => <Icon name="chevron-down"    {...p} />;
    const ChevronUp     = (p) => <Icon name="chevron-up"      {...p} />;
    const FileText      = (p) => <Icon name="file-text"       {...p} />;
    const History       = (p) => <Icon name="history"         {...p} />;
    const Info          = (p) => <Icon name="info"            {...p} />;
    const KeyRound      = (p) => <Icon name="key-round"       {...p} />;
    const Eye           = (p) => <Icon name="eye"             {...p} />;
    const EyeOff        = (p) => <Icon name="eye-off"         {...p} />;
    const X             = (p) => <Icon name="x"                {...p} />;
    const ShieldCheck   = (p) => <Icon name="shield-check"    {...p} />;

    // ── Local storage helpers (each visitor's key stays in their own browser) ──
    const API_KEY_STORAGE_KEY = "omniquery_gemini_api_key";
    const loadStoredApiKey = () => {
      try { return window.localStorage.getItem(API_KEY_STORAGE_KEY) || ""; }
      catch { return ""; }
    };
    const saveStoredApiKey = (key) => {
      try {
        if (key) window.localStorage.setItem(API_KEY_STORAGE_KEY, key);
        else window.localStorage.removeItem(API_KEY_STORAGE_KEY);
      } catch { /* localStorage unavailable, ignore */ }
    };

    // ── Schema Presets ────────────────────────────────────────────────────────
    const SCHEMA_PRESETS = {
      employee: {
        name: "Employee Directory", tableName: "employee_data",
        question: "Find the top 3 highest-paid employees in the Engineering department who were hired after 2022.",
        language: "SQL",
        columns: [
          { name: "employee_id",        type: "INTEGER",  description: "Unique identifier for each employee" },
          { name: "first_name",         type: "VARCHAR",  description: "First name of employee" },
          { name: "last_name",          type: "VARCHAR",  description: "Last name of employee" },
          { name: "department",         type: "VARCHAR",  description: "Department name" },
          { name: "salary",             type: "DECIMAL",  description: "Annual gross salary in USD" },
          { name: "hire_date",          type: "DATE",     description: "Date the employee joined the company" },
          { name: "performance_rating", type: "INTEGER",  description: "Latest performance score from 1 to 5" },
        ],
      },
      sales: {
        name: "Sales Transactions", tableName: "sales_data",
        question: "Calculate the total sales and average order value for each product category in Q4 2025, sorted by total sales descending.",
        language: "Python",
        columns: [
          { name: "transaction_id",   type: "INTEGER", description: "Unique order/transaction ID" },
          { name: "customer_id",      type: "VARCHAR", description: "Unique customer identifier" },
          { name: "product_category", type: "VARCHAR", description: "Category of product purchased" },
          { name: "quantity",         type: "INTEGER", description: "Number of items purchased" },
          { name: "unit_price",       type: "DECIMAL", description: "Price per single item unit" },
          { name: "discount",         type: "DECIMAL", description: "Percentage discount applied (0.00–1.00)" },
          { name: "order_date",       type: "DATE",    description: "Timestamp of purchase order" },
          { name: "region",           type: "VARCHAR", description: "Geographic sales region" },
        ],
      },
      subscriptions: {
        name: "SaaS Subscriptions", tableName: "subscription_data",
        question: "Which subscription plans had the highest customer churn rate last month, and what was their average LTV?",
        language: "SQL",
        columns: [
          { name: "subscription_id",         type: "VARCHAR", description: "Unique subscription identifier" },
          { name: "plan_name",               type: "VARCHAR", description: "Name of SaaS tier (Basic, Pro, Enterprise)" },
          { name: "monthly_rate",            type: "DECIMAL", description: "Recurring monthly cost in USD" },
          { name: "signup_date",             type: "DATE",    description: "Date subscriber registered" },
          { name: "churn_date",              type: "DATE",    description: "Date subscription was cancelled (null if active)" },
          { name: "status",                  type: "VARCHAR", description: "Status: active, churned, paused" },
          { name: "support_tickets_opened",  type: "INTEGER", description: "Total customer service tickets submitted" },
        ],
      },
    };

    const COLUMN_TYPES = ["VARCHAR","INTEGER","DECIMAL","DATE","BOOLEAN","TIMESTAMP","FLOAT"];

    // ── Main App ──────────────────────────────────────────────────────────────
    function App() {
      const [selectedPreset, setSelectedPreset]         = useState("employee");
      const [tableName, setTableName]                   = useState("employee_data");
      const [columns, setColumns]                       = useState(SCHEMA_PRESETS.employee.columns);
      const [language, setLanguage]                     = useState("SQL");
      const [businessQuestion, setBusinessQuestion]     = useState(SCHEMA_PRESETS.employee.question);
      const [newColName, setNewColName]                 = useState("");
      const [newColType, setNewColType]                 = useState("VARCHAR");
      const [newColDesc, setNewColDesc]                 = useState("");
      const [isLoading, setIsLoading]                   = useState(false);
      const [generatedCode, setGeneratedCode]           = useState("");
      const [generatedExplanation, setGeneratedExplanation] = useState("");
      const [errorMsg, setErrorMsg]                     = useState("");
      const [copied, setCopied]                         = useState(false);
      const [history, setHistory]                       = useState([]);
      const [showPromptPreview, setShowPromptPreview]   = useState(false);
      const [notification, setNotification]             = useState(null);
      const [dragOver, setDragOver]                     = useState(false);
      const [apiKey, setApiKey]                         = useState("");
      const [apiKeyInput, setApiKeyInput]               = useState("");
      const [showApiKeyModal, setShowApiKeyModal]       = useState(false);
      const [showApiKeyValue, setShowApiKeyValue]       = useState(false);

      // Load each visitor's own key from their own browser on first mount.
      useEffect(() => {
        const stored = loadStoredApiKey();
        if (stored) {
          setApiKey(stored);
          setApiKeyInput(stored);
        } else {
          setShowApiKeyModal(true);
        }
      }, []);

      const handleSaveApiKey = () => {
        const trimmed = apiKeyInput.trim();
        if (!trimmed) { triggerToast("Please enter a valid API key.", "error"); return; }
        setApiKey(trimmed);
        saveStoredApiKey(trimmed);
        setShowApiKeyModal(false);
        triggerToast("API key saved in your browser.", "success");
      };

      const handleClearApiKey = () => {
        setApiKey(""); setApiKeyInput("");
        saveStoredApiKey("");
        triggerToast("API key removed.", "info");
      };

      const triggerToast = (message, type = "success") => {
        setNotification({ message, type });
        setTimeout(() => setNotification(null), 4000);
      };

      const loadPreset = (key) => {
        const p = SCHEMA_PRESETS[key];
        if (!p) return;
        setSelectedPreset(key);
        setColumns(p.columns);
        setBusinessQuestion(p.question);
        setLanguage(p.language);
        setTableName(p.tableName);
        triggerToast(`Loaded "${p.name}" template.`, "info");
      };

      const handleAddColumn = () => {
        if (!newColName.trim()) { triggerToast("Column name cannot be empty", "error"); return; }
        const formatted = newColName.trim().toLowerCase().replace(/[^a-z0-9_]/g, "_");
        if (columns.some(c => c.name === formatted)) { triggerToast(`Column "${formatted}" already exists`, "error"); return; }
        setColumns([...columns, { name: formatted, type: newColType, description: newColDesc.trim() || "No description provided" }]);
        setNewColName(""); setNewColDesc("");
        triggerToast(`Added column "${formatted}"`, "success");
      };

      const handleDeleteColumn = (i) => {
        const name = columns[i].name;
        setColumns(columns.filter((_, idx) => idx !== i));
        triggerToast(`Removed column "${name}"`, "info");
      };

      const processUploadedFile = (file) => {
        const ext = file.name.split(".").pop().toLowerCase();
        if (ext !== "csv" && ext !== "txt") {
          triggerToast("Only CSV or plain text files are supported. Save Excel as CSV first!", "error"); return;
        }
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const lines = e.target.result.split(/\r?\n/);
            if (!lines[0]) { triggerToast("File appears to be empty.", "error"); return; }
            const headers  = lines[0].split(",").map(h => h.trim().replace(/^["']|["']$/g, ""));
            const firstRow = lines[1] ? lines[1].split(",") : [];
            const inferred = headers.map((header, idx) => {
              const sample = firstRow[idx] ? firstRow[idx].trim().replace(/^["']|["']$/g, "") : "";
              let type = "VARCHAR";
              if (sample) {
                if (!isNaN(sample)) type = sample.includes(".") ? "DECIMAL" : "INTEGER";
                else if (/^(true|false|yes|no|1|0)$/i.test(sample)) type = "BOOLEAN";
                else if (Date.parse(sample) && isNaN(sample) && (sample.includes("-") || sample.includes("/"))) type = "DATE";
              }
              return { name: (header.toLowerCase().replace(/[^a-z0-9_]/g, "_") || `col_${idx+1}`), type, description: `Imported from ${file.name}` };
            });
            setColumns(inferred);
            setTableName(file.name.split(".")[0].toLowerCase().replace(/[^a-z0-9_]/g, "_") + "_data");
            triggerToast(`Parsed ${inferred.length} columns from ${file.name}!`, "success");
          } catch { triggerToast("Failed to parse file. Ensure it is valid CSV.", "error"); }
        };
        reader.readAsText(file);
      };

      const renderSchemaText = () =>
        columns.length === 0 ? "No columns defined yet." :
        columns.map(c => `- ${c.name} (${c.type}): ${c.description}`).join("\n");

      const generateFullPrompt = () => `You are an expert data assistant. Your job is to help users analyze their uploaded Excel data by generating either a SQL query or Python (Pandas) code to answer their specific business questions.

The user's uploaded Excel file has the following structure:

### Data Schema ###
Table Name/DataFrame: '${tableName}'
Columns:
${renderSchemaText()}

### Instructions ###
1. Analyze the user's question and the provided data schema.
2. Identify which language the user has requested: "SQL" or "Python".
3. If SQL: assume data lives in a single table named '${tableName}'. Generate a valid, optimized SQL query (ANSI SQL).
4. If Python: assume data is loaded into a Pandas DataFrame named 'df'. Generate clean, readable Pandas code.
5. Provide ONLY the requested code block inside standard markdown formatting.
6. Add a brief 1-2 sentence explanation below the code.

### User Request ###
Requested Language: ${language}
Business Question: ${businessQuestion}

### Output ###`;

      const parseAssistantResponse = (text) => {
        const match = text.match(/```(?:sql|python|pandas|py)?\n([\s\S]*?)\n```/i);
        if (match) {
          setGeneratedCode(match[1].trim());
          setGeneratedExplanation(text.replace(match[0], "").trim() || "See code above.");
        } else {
          setGeneratedCode(text);
          setGeneratedExplanation("Response was not in standard code-block format — displaying raw output.");
        }
      };

      const runDataAssistant = async () => {
        if (!apiKey.trim()) { triggerToast("Add your Gemini API key first.", "error"); setShowApiKeyModal(true); return; }
        if (columns.length === 0) { triggerToast("Please add at least one column to the schema.", "error"); return; }
        if (!businessQuestion.trim()) { triggerToast("Please write a business question.", "error"); return; }
        setIsLoading(true); setErrorMsg(""); setGeneratedCode(""); setGeneratedExplanation("");

        try {
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${encodeURIComponent(apiKey.trim())}`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              systemInstruction: {
                parts: [{ text: "You are a precise data engineering and SQL/Pandas generator assistant. Follow instructions strictly and output the code block and a brief explanation." }],
              },
              contents: [{ role: "user", parts: [{ text: generateFullPrompt() }] }],
              generationConfig: { maxOutputTokens: 1000 },
            }),
          });
          const data = await res.json();
          const textResponse = data?.candidates?.[0]?.content?.parts?.[0]?.text;
          if (textResponse) {
            parseAssistantResponse(textResponse);
            setHistory(prev => [{
              id: Date.now(), timestamp: new Date().toLocaleTimeString(),
              question: businessQuestion, language, raw: textResponse,
            }, ...prev].slice(0, 10));
            triggerToast("Query generated successfully!", "success");
          } else if (res.status === 400 || res.status === 401 || res.status === 403 || data?.error?.status === "UNAUTHENTICATED" || data?.error?.status === "PERMISSION_DENIED") {
            throw new Error("Invalid API key. Please check it and try again.");
          } else {
            throw new Error(data?.error?.message || "Empty response from model.");
          }
        } catch (err) {
          setErrorMsg(`Error: ${err.message}`);
          triggerToast("Failed to generate code.", "error");
        } finally {
          setIsLoading(false);
        }
      };

      const copyToClipboard = () => {
        if (!generatedCode) return;
        navigator.clipboard.writeText(generatedCode);
        setCopied(true); triggerToast("Copied to clipboard!", "success");
        setTimeout(() => setCopied(false), 2000);
      };

      return (
        <div className="min-h-screen bg-slate-950 text-slate-100 flex flex-col font-sans antialiased">

          {/* Toast */}
          {notification && (
            <div className={`fixed top-5 right-5 z-50 flex items-center space-x-2 px-4 py-3 rounded-xl border shadow-2xl animate-bounce ${
              notification.type === "success" ? "bg-emerald-950/90 border-emerald-500/50 text-emerald-200" :
              notification.type === "error"   ? "bg-rose-950/90 border-rose-500/50 text-rose-200" :
                                                "bg-indigo-950/90 border-indigo-500/50 text-indigo-200"
            }`}>
              <div className="w-2 h-2 rounded-full bg-current animate-ping" />
              <p className="text-sm font-medium">{notification.message}</p>
            </div>
          )}

          {/* Header */}
          <header className="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-40 px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div className="flex items-center space-x-3">
              <div className="p-2.5 bg-gradient-to-tr from-indigo-600 to-violet-500 rounded-xl shadow-lg shadow-indigo-500/20">
                <Database className="w-6 h-6 text-white" />
              </div>
              <div>
                <h1 className="text-xl font-bold tracking-tight bg-gradient-to-r from-white via-slate-200 to-slate-400 bg-clip-text text-transparent">OmniQuery</h1>
                <p className="text-xs text-indigo-400 font-medium tracking-wide uppercase">AI-Powered SQL & Pandas Engineer</p>
              </div>
            </div>
            <div className="flex items-center space-x-3">
              <span className={`text-xs px-2.5 py-1 rounded-full border flex items-center gap-1.5 ${
                apiKey ? "bg-slate-800 text-slate-400 border-slate-700" : "bg-amber-950/40 text-amber-300 border-amber-800/60"
              }`}>
                <span className={`w-1.5 h-1.5 rounded-full ${apiKey ? "bg-emerald-500" : "bg-amber-500"}`} />
                {apiKey ? "Gemini Ready" : "API Key Required"}
              </span>
              <button onClick={() => setShowApiKeyModal(true)}
                className="text-xs px-3 py-1.5 rounded-full bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 flex items-center gap-1.5 font-semibold transition">
                <KeyRound className="w-3.5 h-3.5 text-indigo-400" /> API Key
              </button>
            </div>
          </header>

          {/* API Key Modal */}
          {showApiKeyModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm p-4">
              <div className="bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl max-w-md w-full p-6 space-y-4">
                <div className="flex justify-between items-start">
                  <div className="flex items-center gap-2.5">
                    <div className="p-2 bg-gradient-to-tr from-indigo-600 to-violet-500 rounded-xl shadow-lg shadow-indigo-500/20">
                      <KeyRound className="w-5 h-5 text-white" />
                    </div>
                    <div>
                      <h2 className="text-sm font-bold text-slate-100">Your Gemini API Key</h2>
                      <p className="text-xs text-slate-400">Required to generate queries</p>
                    </div>
                  </div>
                  {apiKey && (
                    <button onClick={() => setShowApiKeyModal(false)}
                      className="p-1.5 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-slate-200 transition">
                      <X className="w-4 h-4" />
                    </button>
                  )}
                </div>

                <div className="bg-indigo-950/20 border border-indigo-900/40 rounded-xl p-3 text-xs text-slate-300 leading-relaxed flex gap-2">
                  <ShieldCheck className="w-4 h-4 text-indigo-400 flex-shrink-0 mt-0.5" />
                  <span>
                    This app calls the Google Gemini API directly from your browser using your own key.
                    It's stored only in your browser's local storage and is never sent anywhere except
                    generativelanguage.googleapis.com.
                  </span>
                </div>

                <div className="space-y-1.5">
                  <label className="text-xs font-semibold text-slate-300">API Key</label>
                  <div className="relative">
                    <input
                      type={showApiKeyValue ? "text" : "password"}
                      value={apiKeyInput}
                      onChange={(e) => setApiKeyInput(e.target.value)}
                      placeholder="AIza..."
                      className="w-full bg-slate-950 border border-slate-800 focus:border-indigo-500 rounded-xl px-3 py-2.5 pr-10 text-xs font-mono text-slate-200 placeholder-slate-600 outline-none transition"
                    />
                    <button onClick={() => setShowApiKeyValue(!showApiKeyValue)}
                      className="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 text-slate-500 hover:text-slate-300 transition">
                      {showApiKeyValue ? <EyeOff className="w-3.5 h-3.5" /> : <Eye className="w-3.5 h-3.5" />}
                    </button>
                  </div>
                  <p className="text-[10.5px] text-slate-500">
                    Get a key from{" "}
                    <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener noreferrer"
                      className="text-indigo-400 hover:text-indigo-300 underline">
                      aistudio.google.com
                    </a>.
                  </p>
                </div>

                <div className="flex gap-2 pt-1">
                  {apiKey && (
                    <button onClick={handleClearApiKey}
                      className="px-4 py-2.5 rounded-xl text-xs font-semibold text-rose-400 hover:text-rose-300 hover:bg-rose-950/30 border border-slate-800 transition">
                      Remove Key
                    </button>
                  )}
                  <button onClick={handleSaveApiKey}
                    className="flex-1 bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 text-white font-bold py-2.5 rounded-xl text-xs shadow-lg transition">
                    Save Key
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Main */}
          <main className="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">

            {/* ── LEFT PANEL ── */}
            <section className="lg:col-span-6 xl:col-span-5 flex flex-col space-y-6">

              {/* Presets */}
              <div className="bg-slate-900/40 border border-slate-800/80 rounded-2xl p-4 shadow-xl">
                <div className="flex items-center justify-between mb-3">
                  <span className="text-xs font-bold text-slate-400 uppercase tracking-wider flex items-center gap-1.5">
                    <Sparkles className="w-3.5 h-3.5 text-indigo-400" /> Select a Starting Template
                  </span>
                </div>
                <div className="grid grid-cols-3 gap-2">
                  {Object.keys(SCHEMA_PRESETS).map(key => (
                    <button key={key} onClick={() => loadPreset(key)}
                      className={`py-2 px-3 rounded-xl text-left text-xs transition duration-200 border ${
                        selectedPreset === key
                          ? "bg-indigo-600/15 border-indigo-500/80 text-white shadow-md font-semibold"
                          : "bg-slate-900 border-slate-800 text-slate-400 hover:text-slate-200"
                      }`}>
                      <div className="flex items-center gap-1 mb-0.5">
                        <FileSpreadsheet className="w-3.5 h-3.5 opacity-80" />
                        <span className="truncate">{SCHEMA_PRESETS[key].name}</span>
                      </div>
                      <span className="text-[10px] text-indigo-400 block truncate">Default: {SCHEMA_PRESETS[key].language}</span>
                    </button>
                  ))}
                </div>
              </div>

              {/* Schema editor */}
              <div className="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-xl flex flex-col space-y-4">
                <div className="flex justify-between items-center">
                  <div>
                    <h2 className="text-base font-bold flex items-center gap-2">
                      <FileSpreadsheet className="w-5 h-5 text-indigo-400" /> Excel / CSV Data Schema
                    </h2>
                    <p className="text-xs text-slate-400">Define the column structure for your analysis</p>
                  </div>
                  <button onClick={() => { setColumns([]); triggerToast("Cleared all columns.", "info"); }}
                    className="text-xs text-rose-400 hover:text-rose-300 font-medium px-2 py-1 hover:bg-rose-950/30 rounded transition">
                    Clear All
                  </button>
                </div>

                {/* Drop zone */}
                <div
                  onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
                  onDragLeave={() => setDragOver(false)}
                  onDrop={(e) => { e.preventDefault(); setDragOver(false); if (e.dataTransfer.files[0]) processUploadedFile(e.dataTransfer.files[0]); }}
                  className={`border-2 border-dashed rounded-xl p-4 text-center cursor-pointer relative group transition ${
                    dragOver ? "border-indigo-500 bg-indigo-950/25" : "border-slate-800 bg-slate-950/40 hover:border-slate-700"
                  }`}
                >
                  <input type="file" accept=".csv" onChange={(e) => e.target.files[0] && processUploadedFile(e.target.files[0])}
                    className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                  <div className="flex flex-col items-center space-y-2 pointer-events-none">
                    <div className="p-2 bg-slate-900 rounded-lg border border-slate-800 group-hover:border-indigo-500/50 transition">
                      <Upload className="w-5 h-5 text-indigo-400" />
                    </div>
                    <p className="text-xs font-medium text-slate-300">Drag & Drop CSV or <span className="text-indigo-400">Browse</span></p>
                    <p className="text-[10px] text-slate-500">Loads columns & infers data types automatically</p>
                  </div>
                </div>

                {/* Table name */}
                <div className="flex gap-2 items-center bg-slate-950 px-3 py-1.5 rounded-lg border border-slate-800">
                  <span className="text-xs font-mono text-slate-500 select-none">Target Object:</span>
                  <input type="text" value={tableName}
                    onChange={(e) => setTableName(e.target.value.replace(/[^a-zA-Z0-9_]/g, ""))}
                    placeholder="table_or_df_name"
                    className="bg-transparent border-none outline-none text-xs font-mono text-indigo-300 w-full" />
                </div>

                {/* Column list */}
                <div className="max-h-56 overflow-y-auto pr-1 space-y-2 custom-scrollbar">
                  {columns.length === 0 ? (
                    <div className="text-center py-6 text-slate-500 text-xs flex flex-col items-center justify-center space-y-1 bg-slate-950/50 rounded-xl border border-slate-800/40">
                      <Info className="w-5 h-5 text-slate-600 mb-1" />
                      <span>No columns configured yet.</span>
                      <span>Add manually below or drop a CSV file!</span>
                    </div>
                  ) : columns.map((col, i) => (
                    <div key={i} className="flex items-center justify-between p-2.5 bg-slate-950 border border-slate-800 rounded-xl text-xs group transition hover:border-slate-700">
                      <div className="flex-1 min-w-0 pr-2">
                        <div className="flex items-center space-x-2">
                          <span className="font-mono font-semibold text-slate-200 truncate">{col.name}</span>
                          <span className="text-[10px] bg-slate-900 border border-slate-800 text-slate-400 px-1.5 py-0.5 rounded uppercase font-medium">{col.type}</span>
                        </div>
                        <p className="text-[11px] text-slate-500 truncate mt-0.5 italic">{col.description}</p>
                      </div>
                      <button onClick={() => handleDeleteColumn(i)}
                        className="opacity-0 group-hover:opacity-100 p-1.5 hover:bg-rose-950/40 text-rose-400 hover:text-rose-300 rounded transition">
                        <Trash2 className="w-3.5 h-3.5" />
                      </button>
                    </div>
                  ))}
                </div>

                {/* Add column form */}
                <div className="border-t border-slate-800 pt-3 space-y-2">
                  <span className="text-xs font-semibold text-slate-300 block mb-1">Add Custom Column</span>
                  <div className="grid grid-cols-2 gap-2">
                    <input type="text" value={newColName} onChange={(e) => setNewColName(e.target.value)}
                      placeholder="Column Name"
                      className="bg-slate-950 border border-slate-800 focus:border-indigo-500 text-xs px-3 py-2 rounded-xl text-slate-200 placeholder-slate-600 outline-none w-full transition" />
                    <select value={newColType} onChange={(e) => setNewColType(e.target.value)}
                      className="bg-slate-950 border border-slate-800 focus:border-indigo-500 text-xs px-3 py-2 rounded-xl text-slate-200 outline-none w-full cursor-pointer transition">
                      {COLUMN_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                    </select>
                  </div>
                  <div className="flex gap-2">
                    <input type="text" value={newColDesc} onChange={(e) => setNewColDesc(e.target.value)}
                      placeholder="Short description (optional)"
                      className="bg-slate-950 border border-slate-800 focus:border-indigo-500 text-xs px-3 py-2 rounded-xl text-slate-200 placeholder-slate-600 outline-none flex-1 transition" />
                    <button onClick={handleAddColumn}
                      className="bg-slate-800 hover:bg-slate-700 text-slate-200 font-semibold px-4 py-2 rounded-xl flex items-center justify-center gap-1.5 transition text-xs border border-slate-700">
                      <Plus className="w-4 h-4" /> Add
                    </button>
                  </div>
                </div>
              </div>

              {/* Query settings */}
              <div className="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-xl flex flex-col space-y-4">
                <div>
                  <h2 className="text-base font-bold flex items-center gap-2">
                    <Settings className="w-5 h-5 text-indigo-400" /> Query Target & Settings
                  </h2>
                  <p className="text-xs text-slate-400">Specify code style and your question</p>
                </div>

                {/* Language toggle */}
                <div className="space-y-1.5">
                  <label className="text-xs font-semibold text-slate-300">Target Analytics Engine</label>
                  <div className="grid grid-cols-2 gap-2 bg-slate-950 p-1.5 rounded-xl border border-slate-800">
                    {["SQL","Python"].map(lang => (
                      <button key={lang} onClick={() => setLanguage(lang)}
                        className={`py-2 rounded-lg text-xs font-semibold flex items-center justify-center gap-1.5 transition ${
                          language === lang ? "bg-indigo-600 text-white shadow-md" : "text-slate-400 hover:text-slate-200"
                        }`}>
                        {lang === "SQL" ? <Database className="w-3.5 h-3.5" /> : <Code className="w-3.5 h-3.5" />}
                        {lang === "SQL" ? "SQL (ANSI)" : "Python (Pandas)"}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Question */}
                <div className="space-y-1.5">
                  <label className="text-xs font-semibold text-slate-300">Your Business Question</label>
                  <textarea value={businessQuestion} onChange={(e) => setBusinessQuestion(e.target.value)}
                    placeholder="E.g., Which region had the highest revenue with discounts below 15%?"
                    rows={3}
                    className="w-full bg-slate-950 border border-slate-800 focus:border-indigo-500 rounded-xl p-3 text-xs text-slate-200 placeholder-slate-600 outline-none resize-none transition" />
                </div>

                {/* Generate button */}
                <button onClick={runDataAssistant} disabled={isLoading}
                  className={`w-full py-3.5 rounded-xl font-bold flex items-center justify-center gap-2 text-sm shadow-xl transition ${
                    isLoading
                      ? "bg-slate-800 text-slate-500 border border-slate-700 cursor-not-allowed"
                      : "bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 text-white"
                  }`}>
                  {isLoading ? (
                    <>
                      <div className="w-4 h-4 border-2 border-indigo-500/30 border-t-indigo-400 rounded-full animate-spin" />
                      Generating Query...
                    </>
                  ) : (
                    <>
                      <Play className="w-4 h-4" /> Generate {language} Query
                    </>
                  )}
                </button>
              </div>
            </section>

            {/* ── RIGHT PANEL ── */}
            <section className="lg:col-span-6 xl:col-span-7 flex flex-col space-y-6">

              {/* Prompt preview */}
              <div className="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-xl">
                <button onClick={() => setShowPromptPreview(!showPromptPreview)}
                  className="w-full px-5 py-3 bg-slate-900 flex justify-between items-center text-xs font-semibold text-slate-300 hover:bg-slate-800 transition">
                  <span className="flex items-center gap-1.5">
                    <FileText className="w-3.5 h-3.5 text-indigo-400" /> Live API Prompt Preview
                  </span>
                  {showPromptPreview ? <ChevronUp className="w-4 h-4" /> : <ChevronDown className="w-4 h-4" />}
                </button>
                {showPromptPreview && (
                  <div className="p-4 bg-slate-950 border-t border-slate-800 max-h-60 overflow-y-auto font-mono text-[10.5px] text-slate-400 leading-relaxed whitespace-pre-wrap custom-scrollbar">
                    {generateFullPrompt()}
                  </div>
                )}
              </div>

              {/* Output */}
              <div className="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-xl flex-1 flex flex-col space-y-4">
                <div className="flex justify-between items-center border-b border-slate-800/80 pb-3">
                  <div>
                    <h2 className="text-base font-bold flex items-center gap-2">
                      <Terminal className="w-5 h-5 text-indigo-400" /> Terminal Code Sandbox
                    </h2>
                    <p className="text-xs text-slate-400">Generated query ready to insert into your workflow</p>
                  </div>
                  {generatedCode && (
                    <button onClick={copyToClipboard}
                      className="flex items-center gap-1.5 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 px-3 py-1.5 rounded-lg text-xs font-semibold transition">
                      {copied ? <Check className="w-3.5 h-3.5 text-emerald-400" /> : <Copy className="w-3.5 h-3.5" />}
                      {copied ? "Copied!" : "Copy Code"}
                    </button>
                  )}
                </div>

                {isLoading && (
                  <div className="flex-1 flex flex-col justify-center items-center py-20 space-y-4">
                    <div className="relative w-16 h-16">
                      <div className="absolute inset-0 border-4 border-indigo-500/20 rounded-full" />
                      <div className="absolute inset-0 border-4 border-t-indigo-500 border-r-indigo-500/40 rounded-full animate-spin" />
                    </div>
                    <div className="text-center space-y-1 animate-pulse">
                      <p className="text-sm font-semibold text-slate-200">Processing schema...</p>
                      <p className="text-xs text-slate-500">Formulating optimal analytical query</p>
                    </div>
                  </div>
                )}

                {errorMsg && !isLoading && (
                  <div className="bg-rose-950/30 border border-rose-900/60 rounded-xl p-4 text-rose-300 text-xs space-y-2">
                    <span className="font-bold">❌ Error</span>
                    <p>{errorMsg}</p>
                  </div>
                )}

                {!generatedCode && !isLoading && !errorMsg && (
                  <div className="flex-1 flex flex-col justify-center items-center py-20 text-center space-y-3 px-6">
                    <div className="p-4 bg-slate-950 rounded-2xl border border-slate-800 text-indigo-400 shadow-inner">
                      <Database className="w-8 h-8 mx-auto" />
                    </div>
                    <div className="max-w-md">
                      <h3 className="text-sm font-bold text-slate-200">Workspace Empty</h3>
                      <p className="text-xs text-slate-500 mt-1 leading-relaxed">
                        Set up your schema, pick SQL or Pandas, and hit <strong className="text-indigo-400">"Generate Query"</strong> to see clean, functional code.
                      </p>
                    </div>
                  </div>
                )}

                {generatedCode && !isLoading && (
                  <div className="flex-1 flex flex-col space-y-4">
                    <div className="relative group">
                      <div className="absolute top-3 right-3 text-[10px] font-mono text-slate-400 bg-slate-900 px-2 py-0.5 rounded border border-slate-800 opacity-40 group-hover:opacity-100 transition">
                        {language.toUpperCase()} ENGINE
                      </div>
                      <pre className="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 md:p-5 overflow-x-auto text-xs font-mono text-indigo-100 leading-relaxed custom-scrollbar whitespace-pre shadow-inner">
                        <code>{generatedCode}</code>
                      </pre>
                    </div>

                    <div className="bg-indigo-950/20 border border-indigo-900/40 rounded-xl p-4 space-y-2">
                      <h3 className="text-xs font-bold text-indigo-300 flex items-center gap-1.5">
                        <Info className="w-3.5 h-3.5 text-indigo-400" /> How this Query Answers your Question
                      </h3>
                      <p className="text-xs text-slate-300 leading-relaxed">{generatedExplanation}</p>
                    </div>

                    <div className="border border-slate-800 rounded-xl overflow-hidden bg-slate-950/50">
                      <div className="px-4 py-2 bg-slate-950 border-b border-slate-800 flex justify-between items-center">
                        <span className="text-[10px] font-mono font-bold text-slate-400 uppercase tracking-wider">Schema Mapping</span>
                        <span className="text-[10px] text-slate-500">Standardized as: {language === "SQL" ? `'${tableName}'` : "'df'"}</span>
                      </div>
                      <div className="p-3 text-[11px] text-slate-400 font-mono space-y-1">
                        <div className="flex gap-2 text-slate-500">
                          <span>Mapped Columns:</span>
                          <span className="text-indigo-300">{columns.map(c => c.name).slice(0,5).join(", ")}{columns.length > 5 ? "…" : ""}</span>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </div>

              {/* History */}
              {history.length > 0 && (
                <div className="bg-slate-900 border border-slate-800 rounded-2xl p-4 shadow-xl">
                  <h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 flex items-center gap-1.5">
                    <History className="w-3.5 h-3.5 text-indigo-400" /> Session History
                  </h3>
                  <div className="divide-y divide-slate-800">
                    {history.map(item => (
                      <div key={item.id} className="py-2.5 flex items-center justify-between text-xs">
                        <div className="flex-1 min-w-0 pr-2">
                          <p className="text-slate-200 truncate font-medium">{item.question}</p>
                          <span className="text-[10px] text-slate-500">{item.timestamp} • <span className="text-indigo-400 font-semibold">{item.language}</span></span>
                        </div>
                        <button onClick={() => {
                          setBusinessQuestion(item.question);
                          setLanguage(item.language);
                          parseAssistantResponse(item.raw);
                          triggerToast("Restored from history.", "info");
                        }} className="text-[10px] text-indigo-400 hover:text-indigo-300 font-semibold flex items-center gap-1 px-2 py-1 bg-slate-950/50 rounded border border-slate-800 hover:border-slate-700 transition">
                          <RotateCcw className="w-3 h-3" /> Restore
                        </button>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </section>
          </main>
        </div>
      );
    }

    // ── Mount ─────────────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
